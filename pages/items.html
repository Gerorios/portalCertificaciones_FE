<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serytec — Maestro de ítems</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    .modal-bg {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.45); z-index:200;
      align-items:center; justify-content:center; padding:1rem;
    }
    .modal-bg.open { display:flex; }
    .modal {
      background:var(--blanco); border-radius:var(--radio);
      padding:1.5rem; width:100%; max-width:520px;
      box-shadow:0 8px 32px rgba(0,0,0,.15);
      max-height:90vh; overflow-y:auto;
    }
    .modal h2 { margin-bottom:1rem; }
    .modal-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:1rem; }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .divider {
      border:none; border-top:1px dashed var(--gris-borde);
      margin:.75rem 0;
    }
  </style>
</head>
<body>
<div class="layout">
  <div id="sidebar-mount"></div>

  <main class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">Maestro de ítems</div>
        <div class="page-sub">Gestion de ítems por contrato</div>
      </div>
      <button class="btn btn-primary" onclick="abrirModalNuevo()">+ Nuevo ítem</button>
    </div>

    <div class="card" style="margin-bottom:1rem">
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
        <div>
          <label>Contrato</label>
          <select id="filtro-k" style="width:auto" onchange="cargarItems()">
            <option value="">Todos los contratos</option>
          </select>
        </div>
        <div style="flex:1;min-width:200px">
          <label>Buscar por código o tarea</label>
          <input type="text" id="filtro-buscar"
                 placeholder="ej: 382 o Reparacion fugas..."
                 oninput="cargarItems()">
        </div>
        <div id="contador" style="font-size:12px;color:var(--gris-texto);padding-bottom:4px"></div>
      </div>
    </div>

    <div class="card">
      <div id="alerta-items" style="margin-bottom:.5rem"></div>
      <div class="tabla-wrap">
        <table>
          <thead>
            <tr>
              <th>Código</th><th>Contrato</th><th>Tarea</th>
              <th>Tipo</th><th>UM</th><th>Ptos. Gasnor</th>
              <th>Contratista</th><th>Frecuencia</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="body-items">
            <tr><td colspan="9" style="text-align:center;color:var(--gris-texto)">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Modal crear / editar -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h2 id="modal-titulo">Nuevo ítem</h2>
    <input type="hidden" id="m-id">

    <!-- Campos principales -->
    <div class="grid-2">
      <div class="form-group">
        <label>Código ítem *</label>
        <input type="text" id="m-codigo" placeholder="ej: 382, 384.1, 116-a">
      </div>
      <div class="form-group">
        <label>Contrato *</label>
        <select id="m-contrato">
          <option value="">Seleccionar...</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Tarea</label>
      <input type="text" id="m-tarea" placeholder="Descripcion de la tarea">
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label>Tipo</label>
        <select id="m-tipo">
          <option value="">Sin especificar</option>
          <option value="OPEX">OPEX</option>
          <option value="CAPEX">CAPEX</option>
        </select>
      </div>
      <div class="form-group">
        <label>Unidad de medida</label>
        <input type="text" id="m-um" placeholder="ej: un, m2, ml">
      </div>
    </div>

    <div class="form-group">
      <label>Ptos. Gasnor</label>
      <input type="number" id="m-ptos" placeholder="ej: 28.00" step="0.01">
    </div>

    <!-- Toggle campos extra -->
    <hr class="divider">
    <button type="button" class="btn btn-sm" id="btn-extra" onclick="toggleCamposExtra()">
      + Ver más campos
    </button>

    <!-- Campos secundarios -->
    <div id="campos-extra" style="display:none;margin-top:.75rem">
      <div class="grid-2">
        <div class="form-group">
          <label>Contratista</label>
          <input type="text" id="m-contratista" placeholder="ej: SER&TEC">
        </div>
        <div class="form-group">
          <label>Frecuencia</label>
          <input type="text" id="m-frecuencia" placeholder="ej: Mensual, Eventual">
        </div>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>Grupo</label>
          <input type="text" id="m-grupo" placeholder="ej: MANTENIMIENTO DE REDES">
        </div>
        <div class="form-group">
          <label>Subgrupo</label>
          <input type="text" id="m-subgrupo">
        </div>
      </div>
      <div class="form-group">
        <label>Nombre contrato</label>
        <input type="text" id="m-contrato-nombre" placeholder="ej: MANTENIMIENTO DE LA RED">
      </div>
    </div>

    <div id="alerta-modal" style="margin-top:.75rem"></div>

    <div class="modal-footer">
      <button class="btn" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-guardar" onclick="guardarItem()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal confirmar eliminar -->
<div class="modal-bg" id="modal-eliminar">
  <div class="modal" style="max-width:400px;text-align:center">
    <div style="font-size:40px;margin-bottom:.75rem">🗑️</div>
    <h2 style="margin-bottom:.5rem">Eliminar ítem</h2>
    <p style="color:var(--gris-texto);font-size:13px;margin-bottom:1.25rem">
      Confirmas que queres eliminar el ítem
      <strong id="eliminar-codigo"></strong> del contrato
      <strong id="eliminar-contrato"></strong>?
      Esta accion no se puede deshacer.
    </p>
    <div id="alerta-eliminar" style="margin-bottom:.75rem"></div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn" onclick="cerrarModalEliminar()">Cancelar</button>
      <button class="btn btn-danger" id="btn-confirmar-eliminar">Eliminar</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/sidebar.js"></script>
<script>
Auth.requireLogin();
Auth.requireAdmin();
renderSidebar("admin");

let contratos     = [];
let itemAEliminar = null;

async function init() {
  contratos = await get("/items/contratos");
  const selFiltro = document.getElementById("filtro-k");
  const selModal  = document.getElementById("m-contrato");
  contratos.forEach(c => {
    selFiltro.appendChild(new Option(c.codigo_k, c.codigo_k));
    selModal.appendChild(new Option(c.codigo_k, c.codigo_k));
  });
  cargarItems();
}

async function cargarItems() {
  const k      = document.getElementById("filtro-k").value;
  const buscar = document.getElementById("filtro-buscar").value.trim();

  let url = "/items/?";
  if (k)      url += `codigo_k=${encodeURIComponent(k)}&`;
  if (buscar) url += `buscar=${encodeURIComponent(buscar)}`;

  try {
    const items = await get(url);
    document.getElementById("contador").textContent = items.length + " ítems encontrados";
    renderTabla(items);
  } catch (err) {
    showAlert(document.getElementById("alerta-items"), err.message);
  }
}

function renderTabla(items) {
  if (!items.length) {
    document.getElementById("body-items").innerHTML =
      '<tr><td colspan="9" style="text-align:center;color:var(--gris-texto)">Sin resultados</td></tr>';
    return;
  }
  document.getElementById("body-items").innerHTML = items.map(i => `
    <tr>
      <td><strong>${i.item_codigo}</strong></td>
      <td><span class="badge badge-info">${i.codigo_k}</span></td>
      <td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
          title="${i.tarea||''}">${i.tarea||'—'}</td>
      <td><span class="badge ${i.tipo==='OPEX'?'badge-ok':'badge-warn'}">${i.tipo||'—'}</span></td>
      <td>${i.unidad_medida||'—'}</td>
      <td>${i.ptos_gasnor||'—'}</td>
      <td>${i.contratista||'—'}</td>
      <td>${i.frecuencia||'—'}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-sm" onclick='abrirModalEditar(${JSON.stringify(i)})'>Editar</button>
        <button class="btn btn-sm btn-danger"
                onclick='confirmarEliminar(${i.id_item},"${i.item_codigo}","${i.codigo_k}")'>🗑</button>
      </td>
    </tr>
  `).join("");
}

// ── Toggle campos extra ───────────────────────────────────────
function toggleCamposExtra() {
  const div     = document.getElementById("campos-extra");
  const btn     = document.getElementById("btn-extra");
  const visible = div.style.display !== "none";
  div.style.display = visible ? "none" : "block";
  btn.textContent   = visible ? "+ Ver más campos" : "- Ocultar campos";
}

// ── Modal nuevo ───────────────────────────────────────────────
function abrirModalNuevo() {
  document.getElementById("modal-titulo").textContent = "Nuevo ítem";
  document.getElementById("m-id").value          = "";
  document.getElementById("m-codigo").value      = "";
  document.getElementById("m-codigo").disabled   = false;
  document.getElementById("m-contrato").value    = "";
  document.getElementById("m-tarea").value       = "";
  document.getElementById("m-tipo").value        = "";
  document.getElementById("m-um").value          = "";
  document.getElementById("m-ptos").value        = "";
  document.getElementById("m-contratista").value = "";
  document.getElementById("m-frecuencia").value  = "";
  document.getElementById("m-grupo").value       = "";
  document.getElementById("m-subgrupo").value    = "";
  document.getElementById("m-contrato-nombre").value = "";
  // Ocultar campos extra
  document.getElementById("campos-extra").style.display = "none";
  document.getElementById("btn-extra").textContent      = "+ Ver más campos";
  clearAlert(document.getElementById("alerta-modal"));
  document.getElementById("modal-bg").classList.add("open");
}

// ── Modal editar ──────────────────────────────────────────────
function abrirModalEditar(item) {
  document.getElementById("modal-titulo").textContent = `Editar ${item.item_codigo} — ${item.codigo_k}`;
  document.getElementById("m-id").value          = item.id_item;
  document.getElementById("m-codigo").value      = item.item_codigo;
  document.getElementById("m-codigo").disabled   = true;
  document.getElementById("m-contrato").value    = item.codigo_k;
  document.getElementById("m-tarea").value       = item.tarea         || "";
  document.getElementById("m-tipo").value        = item.tipo          || "";
  document.getElementById("m-um").value          = item.unidad_medida || "";
  document.getElementById("m-ptos").value        = item.ptos_gasnor   || "";
  document.getElementById("m-contratista").value = item.contratista   || "";
  document.getElementById("m-frecuencia").value  = item.frecuencia    || "";
  document.getElementById("m-grupo").value       = item.grupo         || "";
  document.getElementById("m-subgrupo").value    = item.subgrupo      || "";
  document.getElementById("m-contrato-nombre").value = item.contrato_nombre || "";

  // Mostrar campos extra si alguno tiene valor
  const tieneExtra = item.contratista || item.frecuencia || item.grupo ||
                     item.subgrupo    || item.contrato_nombre;
  document.getElementById("campos-extra").style.display = tieneExtra ? "block" : "none";
  document.getElementById("btn-extra").textContent      = tieneExtra ? "- Ocultar campos" : "+ Ver más campos";

  clearAlert(document.getElementById("alerta-modal"));
  document.getElementById("modal-bg").classList.add("open");
}

function cerrarModal() {
  document.getElementById("modal-bg").classList.remove("open");
}

async function guardarItem() {
  const id       = document.getElementById("m-id").value;
  const codigo   = document.getElementById("m-codigo").value.trim();
  const contrato = document.getElementById("m-contrato").value;
  const alertaM  = document.getElementById("alerta-modal");

  if (!codigo)   { showAlert(alertaM, "El código es obligatorio");   return; }
  if (!contrato) { showAlert(alertaM, "El contrato es obligatorio"); return; }

  const body = {
    item_codigo:     codigo,
    codigo_k:        contrato,
    tarea:           document.getElementById("m-tarea").value.trim()       || null,
    tipo:            document.getElementById("m-tipo").value               || null,
    unidad_medida:   document.getElementById("m-um").value.trim()          || null,
    ptos_gasnor:     parseFloat(document.getElementById("m-ptos").value)   || null,
    contratista:     document.getElementById("m-contratista").value.trim() || null,
    frecuencia:      document.getElementById("m-frecuencia").value.trim()  || null,
    grupo:           document.getElementById("m-grupo").value.trim()       || null,
    subgrupo:        document.getElementById("m-subgrupo").value.trim()    || null,
    contrato_nombre: document.getElementById("m-contrato-nombre").value.trim() || null,
  };

  const btn = document.getElementById("btn-guardar");
  btn.disabled = true;

  try {
    if (id) {
      await patch(`/items/${id}`, body);
    } else {
      await post("/items/", body);
    }
    cerrarModal();
    showAlert(document.getElementById("alerta-items"), "Ítem guardado correctamente", "ok");
    cargarItems();
  } catch (err) {
    showAlert(alertaM, err.message);
  } finally {
    btn.disabled = false;
  }
}

// ── Modal eliminar ────────────────────────────────────────────
function confirmarEliminar(id, codigo, contrato) {
  itemAEliminar = id;
  document.getElementById("eliminar-codigo").textContent   = codigo;
  document.getElementById("eliminar-contrato").textContent = contrato;
  clearAlert(document.getElementById("alerta-eliminar"));
  document.getElementById("modal-eliminar").classList.add("open");
}

function cerrarModalEliminar() {
  document.getElementById("modal-eliminar").classList.remove("open");
  itemAEliminar = null;
}

document.getElementById("btn-confirmar-eliminar").addEventListener("click", async () => {
  if (!itemAEliminar) return;
  const btn = document.getElementById("btn-confirmar-eliminar");
  btn.disabled = true;
  try {
    await del(`/items/${itemAEliminar}`);
    cerrarModalEliminar();
    showAlert(document.getElementById("alerta-items"), "Ítem eliminado", "ok");
    cargarItems();
  } catch (err) {
    showAlert(document.getElementById("alerta-eliminar"), err.message);
  } finally {
    btn.disabled = false;
  }
});

["modal-bg","modal-eliminar"].forEach(id => {
  document.getElementById(id).addEventListener("click", e => {
    if (e.target === document.getElementById(id)) {
      id === "modal-bg" ? cerrarModal() : cerrarModalEliminar();
    }
  });
});

init();
</script>
</body>
</html>
