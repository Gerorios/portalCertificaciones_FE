<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serytec — Ingresar</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { width: 100%; max-width: 380px; }
    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-logo h1 { color: var(--verde); font-size: 28px; }
    .login-logo p  { color: var(--gris-texto); font-size: 13px; margin-top: 4px; }
    .login-box .card { padding: 1.75rem; }
    #alerta { min-height: 20px; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <h1>Serytec</h1>
      <p>Sistema de certificaciones Naturgy</p>
    </div>

    <div class="card">
      <div id="alerta"></div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="nombre@serytec.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn btn-primary btn-full" id="btn-login">
        Ingresar
      </button>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Si ya está logueado, redirigir
    if (Auth.isLoggedIn()) window.location.href = "pages/dashboard.html";

    const btnLogin  = document.getElementById("btn-login");
    const alerta    = document.getElementById("alerta");

    async function doLogin() {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        showAlert(alerta, "Completá email y contraseña");
        return;
      }

      btnLogin.disabled = true;
      btnLogin.innerHTML = '<span class="spinner"></span> Ingresando...';
      clearAlert(alerta);

      try {
        // FastAPI OAuth2 espera form-urlencoded
        const formData = new URLSearchParams();
        formData.append("username", email);
        formData.append("password", password);

        const res = await fetch(`${API}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: formData,
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Error al ingresar");

        Auth.setSession(data.access_token, data.usuario);
        window.location.href = "pages/dashboard.html";

      } catch (err) {
        showAlert(alerta, err.message);
        btnLogin.disabled = false;
        btnLogin.textContent = "Ingresar";
      }
    }

    btnLogin.addEventListener("click", doLogin);
    document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
  </script>
</body>
</html>
