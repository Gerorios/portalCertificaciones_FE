<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serytec — Ingresar</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--secundario);
    }
    .login-box { width: 100%; max-width: 380px; padding: 1rem; }
    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-logo img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      margin-bottom: .75rem;
    }
    .login-logo h1 {
      color: var(--primario);
      font-size: 26px;
      letter-spacing: .5px;
    }
    .login-logo p {
      color: rgba(255,255,255,.5);
      font-size: 13px;
      margin-top: 4px;
    }
    .login-card {
      background: var(--blanco);
      border-radius: var(--radio);
      padding: 1.75rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.3);
    }
    .btn-login {
      width: 100%;
      padding: 10px;
      background: var(--primario);
      color: var(--secundario);
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover { background: var(--primario-dark); color: var(--blanco); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }
    #alerta { min-height: 20px; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <img src="img/LogoST.png" alt="Serytec"
           onerror="this.style.display='none'">
      <h1>Serytec</h1>
      <p>Sistema de certificaciones Naturgy</p>
    </div>

    <div class="login-card">
      <div id="alerta"></div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email"
               placeholder="nombre@serytec.com"
               autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password"
               placeholder="••••••••"
               autocomplete="current-password">
      </div>

      <button class="btn-login" id="btn-login">
        Ingresar
      </button>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.href = "pages/dashboard.html";

    const btnLogin = document.getElementById("btn-login");
    const alerta   = document.getElementById("alerta");

    async function doLogin() {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        showAlert(alerta, "Completá email y contraseña");
        return;
      }

      btnLogin.disabled = true;
      btnLogin.innerHTML = '<span class="spinner" style="border-top-color:var(--secundario)"></span> Ingresando...';
      clearAlert(alerta);

      try {
        const formData = new URLSearchParams();
        formData.append("username", email);
        formData.append("password", password);

        const res = await fetch(`${API}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: formData,
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Error al ingresar");

        Auth.setSession(data.access_token, data.usuario);
        window.location.href = "pages/dashboard.html";

      } catch (err) {
        showAlert(alerta, err.message);
        btnLogin.disabled = false;
        btnLogin.innerHTML = "Ingresar";
      }
    }

    btnLogin.addEventListener("click", doLogin);
    document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
  </script>
</body>
</html>
